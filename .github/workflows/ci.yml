name: CI Pipeline

# Concurrency control - cancel previous runs when new commits are pushed
# This saves CI minutes by ensuring only the latest commit is tested
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.vscode/**'
      - '.scripts/README.md'
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.vscode/**'
      - '.scripts/README.md'

jobs:
  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: linux
            runner: [self-hosted, Linux]
          - os: macos
            runner: [self-hosted, macOS]
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure Python is present
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.15'
          # This is key: setup-python will download a portable version 
          # if the runner doesn't have it.

      - name: PlatformIO Execution
        run: |
          # 1. Create a job-specific virtual environment
          python -m venv .pio_venv
          source .pio_venv/bin/activate
          
          # 2. Install PIO inside this environment
          pip install -U platformio
          
          # 3. Direct all PIO downloads (compilers, libs) to the workspace
          # This prevents polluting the runner's home directory (~/.platformio)
          export PLATFORMIO_CORE_DIR=$GITHUB_WORKSPACE/.pio_core
          
          # 4. Execute the tests
          pio test -e native
        
      - name: Total Cleanup
        if: always()
        run: |
          # Delete the virtual env, the core toolchains, and build artifacts
          rm -rf .pio_venv
          rm -rf .pio_core
          rm -rf .pio