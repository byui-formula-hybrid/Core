; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nucleo_f767zi]
platform = ststm32
board = nucleo_f767zi
framework = stm32cube
extra_scripts = pre:force_fpu.py ;This python script is necessary for enabling floating point precision for FreeRTOS on an STM32
board_build.stm32cube.custom_config_header = yes ;If you don't add this line, your build will use the default config header which has missing definitions
board_build.f_cpu = cortex-m7 ;Highly recommend you determine your cpu for your board and add this line (alleviates potential build issues later on)
board_build.ldscript = STM32F767ZITX_FLASH.ld ;If you don't have this good luck getting GPIO or FreeRTOS to work predictably, if you don't it will try the default and when you upload nothing will happen
lib_archive = no ;This is necessary for allowing board specific files to be put into the lib folder i.e.: lib\STM32F7
monitor_speed = 115200 ;For serial monitoring
upload_protocol = stlink ;You can get away without, but eases the use of debugging. WARNING, do not use this unless an actual stlink is used for connecting and programming these (almost all dev boards have one)
build_flags = ;The -I means include, if you don't do that header files (.h) can get missed during build
    -D ENV_STM32
    -D ENV_STM32F7
    -I include
    -I lib/STM32F7
    -I lib/STM32F7/include
    -I lib/STM32F7/src
    -I lib/FreeRTOS
    -I lib/FreeRTOS/CMSIS_RTOS_V2
    -I lib/FreeRTOS/include
    -I lib/FreeRTOS/portable/gcc/ARM_CM7/r0p1 ; This is a board specific stm32 folder for integrating RTOS, to get it for other boards use CubeMX
test_ignore = *

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
build_flags =
    -D ENV_ESP32
    -D ENV_ESPDEV
    -I include
test_ignore = *

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
build_flags =
    -D ENV_ESP32
    -D ENV_S3
    -I include
test_ignore = *

[env:esp32-s3-devkitc-1-n16r8v]
platform = espressif32
board = esp32-s3-devkitc-1-n16r8v
framework = espidf
monitor_speed = 115200
build_flags =
    -D ENV_ESP32
    -D ENV_S3N16
    -I include
test_ignore = *

; Native environment for unit testing (TESTS ONLY - no hardware needed)
[env:native]
platform = native
test_framework = unity
test_build_src = no
build_type = debug
debug_test = test*
build_flags = 
    -DUNITY_INCLUDE_DOUBLE
    -DARDUINO_ARCH_NATIVE
    -std=c++11
; Unity is ONLY included for testing, not in main builds
lib_deps = 
    throwtheswitch/Unity@^2.5.2
; This is the ONLY environment where tests are run
; Use: pio test -e native
